<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tutorial Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fab.css">
    <script>
      (function() {
        var savedTheme = localStorage.getItem('fab_theme');
        if (!savedTheme && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          savedTheme = 'dark';
        }
        
        if (savedTheme === 'dark') {
          var style = document.createElement('style');
          style.id = 'theme-critical';
          style.textContent = 'html{color-scheme:dark}body{background:#1A1A1A;color:#F5F9FC}.navbar{background:#2A2A2A;border-bottom-color:#404040}.navbar-brand{color:#4A90E2}.nav-link{color:#F5F9FC}.breadcrumb{background:#1A1A1A}.breadcrumb-list a{color:#4A90E2}.breadcrumb-list [aria-current="page"]{color:#B0B0B0}.card,.filters-section,.admin-container,.forum-controls,.section-header,.comparison-section,.prosthetic-card,.tutorial-card,.modal-content,.modal-overlay,.filter-checkbox{background:#2A2A2A;border-color:#404040;color:#F5F9FC}.dropdown-menu,.admin-dropdown-menu{background:#2A2A2A;border-color:#404040}.btn-primary{background:#4A90E2;color:#FFFFFF}.btn-secondary{background:#2A2A2A;color:#F5F9FC;border-color:#404040}input,select,textarea{background:#1A1A1A;color:#F5F9FC;border-color:#404040}.prosthetic-image-wrapper,.feature-badge,.filter-checkbox{background:#1A1A1A}.breadcrumb-list a:hover{color:#6BA3F0}.modal-actions{background:#1A1A1A;border-top-color:#404040}.page-title,.forum-page-title,.modal-header h2{color:#F5F9FC}.prosthetic-category,.feature-tag{background:rgba(74,144,226,0.15);color:#6BA3F0}.prosthetic-price{color:#6BA3F0}.prosthetic-type,.prosthetic-description,.tutorial-description{color:#B0B0B0}.tutorial-thumbnail::after{background:rgba(255,255,255,0.85)}.modal-section h3{color:#4A90E2}.info-label{color:#B0B0B0}.feature-tag{border-color:rgba(74,144,226,0.3)}';
          document.head.appendChild(style);
          document.documentElement.classList.add('dark-mode-pending');
          document.body.classList.add('dark-mode');
        } else if (savedTheme === 'light') {
          document.documentElement.classList.remove('dark-mode-pending');
          document.body.classList.remove('dark-mode');
          document.documentElement.style.colorScheme = 'light';
          var old = document.getElementById('theme-critical');
          if (old && old.parentNode) old.parentNode.removeChild(old);
        }
      })();
    </script>
    <style>
        .admin-container {
            max-width: 700px;
            margin: 2rem auto;
            padding: 2rem;
            background: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #0052a3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error {
            color: #d32f2f;
            margin-top: 1rem;
            padding: 1rem;
            background: #ffebee;
            border-radius: 4px;
        }
        .success {
            color: #388e3c;
            margin-top: 1rem;
            padding: 1rem;
            background: #e8f5e9;
            border-radius: 4px;
        }
        .loading {
            font-size: 0.9rem;
            color: #666;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Add New Tutorial</h1>
        
        <form id="tutorialForm">
            <div class="form-group">
                <label for="title">Tutorial Title *</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description"></textarea>
            </div>

            <div class="form-group">
                <label for="youtubeId">YouTube Video ID *</label>
                <input type="text" id="youtubeId" name="youtubeId" required placeholder="e.g., dQw4w9WgXcQ">
                <small style="color: #666; display: block; margin-top: 0.25rem;">The video ID from the YouTube URL (after v=)</small>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="videoCategory">Category *</label>
                    <select id="videoCategory" name="videoCategory" required>
                        <option value="">-- Select Category --</option>
                        <option value="gettingstarted">Getting Started</option>
                        <option value="care-maintenance">Care & Maintenance</option>
                        <option value="activity">Activity & Daily Life</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="level">Level *</label>
                    <select id="level" name="level" required>
                        <option value="">-- Select Level --</option>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="transcript">Transcript</label>
                <textarea id="transcript" name="transcript" placeholder="Full transcript of the video..."></textarea>
            </div>

            <div class="form-group">
                <label for="duration">Duration (e.g., "8 min")</label>
                <input type="text" id="duration" name="duration" placeholder="8 min">
            </div>

            <div class="form-group">
                <label for="tags">Tags (comma-separated)</label>
                <input type="text" id="tags" name="tags" placeholder="prosthetics, care, beginner">
                <small style="color: #666; display: block; margin-top: 0.25rem;">Separate multiple tags with commas</small>
            </div>

            <button type="submit">Add Tutorial</button>
        </form>

        <div id="message"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-init.js"></script>
    <script>
        const form = document.getElementById('tutorialForm');
        const messageDiv = document.getElementById('message');

        // Wait for Supabase to be ready
        async function initializeUI() {
            if (!window.sb) {
                setTimeout(initializeUI, 100);
                return;
            }
            // Supabase is ready, form can be submitted
        }

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const supabase = window.sb;

            const title = document.getElementById('title').value?.trim();
            const description = document.getElementById('description').value?.trim() || null;
            const youtubeId = document.getElementById('youtubeId').value?.trim();
            const videoCategory = document.getElementById('videoCategory').value;
            const level = document.getElementById('level').value;
            const transcript = document.getElementById('transcript').value?.trim() || null;
            const duration = document.getElementById('duration').value?.trim() || null;
            const tagsInput = document.getElementById('tags').value?.trim();
            
            // Parse tags into array
            const tags = tagsInput ? tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag) : [];

            // Validate required fields
            if (!title || !youtubeId || !videoCategory || !level) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            // Validate YouTube ID format (should be 11 characters)
            if (youtubeId.length !== 11) {
                showMessage('YouTube ID should be 11 characters long', 'error');
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('tutorials')
                    .insert([
                        {
                            title,
                            description,
                            youtube_id: youtubeId,
                            video_category: videoCategory,
                            level,
                            transcript,
                            duration,
                            tags: tags.length > 0 ? tags : null
                        }
                    ])
                    .select();

                if (error) throw error;

                showMessage('Tutorial added successfully!', 'success');
                form.reset();

            } catch (error) {
                console.error('Error inserting tutorial:', error);
                showMessage('Error adding tutorial: ' + error.message, 'error');
            }
        });

        // Show/hide messages
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = type;
            setTimeout(() => {
                if (messageDiv.className === type) {
                    messageDiv.textContent = '';
                    messageDiv.className = '';
                }
            }, 5000);
        }

        // Initialize on page load
        initializeUI();
    </script>

    <script src="js/fab.js"></script>

    <!-- Floating Action Button Container -->
    <div class="fab-container" role="region" aria-label="Page accessibility controls">
      <button id="fab-btn-increase" class="fab-btn fab-btn-increase" aria-label="Increase font size">A+</button>
      <button id="fab-btn-decrease" class="fab-btn fab-btn-decrease" aria-label="Decrease font size">A−</button>
      <button id="fab-btn-toggle-theme" class="fab-btn fab-btn-toggle-theme" aria-label="Toggle light and dark theme" title="Toggle between light and dark theme">�</button>
    </div>
</body>
</html>
